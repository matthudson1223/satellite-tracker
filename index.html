<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Real-time 3D satellite tracker — live positions of thousands of satellites computed from public orbital data." />
    <title>Orbital — Satellite Tracker</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #02030a;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: #e8ecf4;
      }
      #scene {
        position: fixed;
        inset: 0;
        display: block;
        touch-action: none;
      }
      #app {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        justify-content: center;
        background: #02030a;
        z-index: 100;
        transition: opacity 0.6s ease;
        font-size: 13px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #5b6b8c;
      }
      #boot.done { opacity: 0; pointer-events: none; }
      #boot .ring {
        width: 42px; height: 42px;
        border-radius: 50%;
        border: 1px solid #1c2840;
        border-top-color: #6ea8ff;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="app"></div>
    <div id="boot"><div class="ring"></div><div id="boot-msg">Initializing</div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
